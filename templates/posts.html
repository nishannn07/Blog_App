{% extends 'base.html' %}
{% block content %}
<h1>PUBLISHED POSTS</h1>
{% for post in posts %}
<div>
    <h3>{{post.title}}</h3>
    <p>By {{post.author.username}}</p>
    <p>
        {% for tag in post.tags %}
        <div>{{tag}}</div>
        {% endfor %}
    </p>
</div>
{% endfor %}
{% endblock %}
